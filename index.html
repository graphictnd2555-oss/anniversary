
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary! ❤️</title>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #4f5d75;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .gif-container img {
            width: 180px;
            height: 220px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 120px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 10px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s ease;
            z-index: 10;
            animation: heartbeat 1.2s infinite; 
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            transition: all 0.1s ease;
            z-index: 5;
            position: relative;
        }

        @keyframes heartbeat {
            0% { transform: scale(var(--btn-scale, 1)); }
            20% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            40% { transform: scale(calc(var(--btn-scale, 1) * 1.02)); }
            60% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            80% { transform: scale(var(--btn-scale, 1)); }
            100% { transform: scale(var(--btn-scale, 1)); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="gif-container">
            <!-- 📸 ลิงก์รูปแรก (รูปหล่อๆ ของนาย) -->
            <img id="statusGif" src="ใส่ลิงก์รูปแรกตรงนี้" alt="my photo">
        </div>
        
        <h1 id="titleText">Happy Anniversary นะคะคุณแฟน 💖</h1>
        <p id="questionText">เค้ามีอะไรจะถาม... รักเค้ามั้ย?</p>

        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">รักที่สุด</button>
            <!-- 🛠️ แก้ไขตรงนี้: เรียกใช้ handleNoAction เพื่อให้วิ่งหนีและเปลี่ยนเป็นรูปร้องไห้ที่ถูกต้อง -->
            <button id="noBtn" onmouseover="handleNoAction()" onclick="handleNoAction()">ไม่รัก</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const titleText = document.getElementById('titleText');
        const questionText = document.getElementById('questionText');
        const statusGif = document.getElementById('statusGif');

        let currentScale = 1;

        // 🔗 ใส่ลิงก์รูปภาพที่นายลบพื้นหลังแล้วตรงนี้ได้เลย
        const startPhoto = "ใส่ลิงก์รูปแรกตรงนี้"; 
        const cryPhoto = "ใส่ลิงก์รูปร้องไห้ตรงนี้";
        const happyGif = "https://media.tenor.com/images/30713b10b00790b070407a56112ed2f0/tenor.gif"; 

        // ฟังก์ชันเมื่อพยายามกด "ไม่รัก" (ปุ่มวิ่งหนี + หน้าเปลี่ยนเป็นร้องไห้)
        function handleNoAction() {
            // 1. สุ่มพิกัดให้ปุ่มวิ่งหนี
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // 2. ขยายปุ่มรักให้ใหญ่ขึ้นเรื่อยๆ
            currentScale += 0.25;
            yesBtn.style.setProperty('--btn-scale', currentScale);

            // 3. เปลี่ยนรูปเป็นหน้าร้องไห้ + เปลี่ยนข้อความงอน
            statusGif.src = cryPhoto;
            titleText.innerText = "เสียใจอ่าาาา 🥺";
            questionText.innerText = "ทำไมจะกดไม่รักเค้าล่ะ แงงงงงงงง";
        }

        // ฟังก์ชันเมื่อกด "รักที่สุด" (สำเร็จ!)
        function selectYes() {
            titleText.innerText = "เค้าก้รักแพมเหมือนกันนน้าา ❤️";
            questionText.innerText = "อยู่ด้วยกันไปนานๆ นะครับ 🥰";
            
            statusGif.src = happyGif; 
            statusGif.style.width = "160px";
            statusGif.style.height = "160px";
            
            noBtn.style.display = 'none';
            yesBtn.style.animation = 'none';
            yesBtn.style.transform = 'scale(1.3)';
            yesBtn.innerText = "จุ๊บๆ 💋";
            yesBtn.onclick = null;
        }
    </script>
</body>
</html>
