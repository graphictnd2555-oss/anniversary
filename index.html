
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary! ❤️</title>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #ffe6e6; /* สีชมพูพาสเทลหวานๆ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #4f5d75;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px; /* เพิ่มพื้นที่ให้ปุ่มขยาย */
            position: relative;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 10px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s ease;
            z-index: 10; /* ให้ปุ่มรักอยู่ด้านบนสุดเวลาขยายใหญ่ */
            /* ใส่แอนิเมชันให้ปุ่มขยับเต้นตุบๆ ดึงดูดสายตา */
            animation: heartbeat 1.2s infinite; 
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            position: absolute;
            left: 180px; 
            transition: all 0.1s ease;
            z-index: 5;
        }

        /* เอฟเฟกต์ปุ่มรักเต้นดุ๊กดิ๊ก */
        @keyframes heartbeat {
            0% { transform: scale(var(--btn-scale, 1)); }
            20% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            40% { transform: scale(calc(var(--btn-scale, 1) * 1.02)); }
            60% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            80% { transform: scale(var(--btn-scale, 1)); }
            100% { transform: scale(var(--btn-scale, 1)); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="gif-container">
            <img id="statusGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BndjJ0ZXB2c3d5cXd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5JnB0PT1zJnY9MSZjdD1z/L4lvBpHWkARt7gocGF/giphy.gif" alt="cute cat">
        </div>
        
        <h1 id="titleText">Happy Anniversary นะคะคุณแฟน 💖</h1>
        <p id="questionText">เค้ามีอะไรจะถาม... รักเค้ามั้ย?</p>

        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">รักที่สุด</button>
            <button id="noBtn" onmouseover="handleNoAction()" onclick="handleNoAction()">ไม่รัก</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const titleText = document.getElementById('titleText');
        const questionText = document.getElementById('questionText');
        const statusGif = document.getElementById('statusGif');

        let currentScale = 1; // ขนาดเริ่มต้นของปุ่มรัก

        // ฟังก์ชันจัดการเมื่อแฟนพยายามกด "ไม่รัก"
        function handleNoAction() {
            // 1. สั่งปุ่มไม่รักวิ่งหนี
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // 2. ขยายปุ่มรักให้ใหญ่ขึ้นเรื่อยๆ ทุกครั้งที่กดไม่รัก
            currentScale += 0.25; // เพิ่มขนาดทีละ 25%
            yesBtn.style.setProperty('--btn-scale', currentScale);
        }

        // ฟังก์ชันเมื่อกดปุ่ม "รักที่สุด"
        function selectYes() {
            titleText.innerText = "เย้ๆๆๆๆ! ฮั่นแน่ รู้อยู่แล้วว่ารัก ❤️";
            questionText.innerText = "เค้าก็รักตัวเองเหมือนกันนะ อยู่ด้วยกันไปนานๆ นะครับ 🥰";
            
            // เปลี่ยนเป็นรูปหัวใจหวานๆ
            statusGif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3d5OHd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5OHd5JnB0PT1zJnY9MSZjdD1z/26fldmSiD5SUdBFIY/giphy.gif";
            
            // เคลียร์ทุกอย่าง ลบปุ่มไม่รักทิ้ง ลบแอนิเมชันเต้นออก
            noBtn.style.display = 'none';
            yesBtn.style.animation = 'none';
            yesBtn.style.transform = 'scale(1.3)';
            yesBtn.innerText = "จุ๊บๆ 💋";
            yesBtn.onclick = null;
        }
    </script>
</body>
</html>
