
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary! ❤️</title>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #4f5d75;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .gif-container img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        /* ปรับตรงนี้ให้จัดปุ่มอยู่ตรงกลางแบบไม่ทับกัน */
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 120px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 10px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s ease;
            z-index: 10;
            animation: heartbeat 1.2s infinite; 
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            transition: all 0.1s ease;
            z-index: 5;
            position: relative; /* เริ่มต้นให้เรียงต่อกันปกติ ไม่ทับกัน */
        }

        @keyframes heartbeat {
            0% { transform: scale(var(--btn-scale, 1)); }
            20% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            40% { transform: scale(calc(var(--btn-scale, 1) * 1.02)); }
            60% { transform: scale(calc(var(--btn-scale, 1) * 1.08)); }
            80% { transform: scale(var(--btn-scale, 1)); }
            100% { transform: scale(var(--btn-scale, 1)); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="gif-container">
            <!-- เปลี่ยนเป็นลิงก์รูปแมวอ้อนอันใหม่ ชัวร์แน่นอน -->
            <img id="statusGif" src="https://media.tenor.com/images/84cf3e433db9b9c9480d191244e87661/tenor.gif" alt="cute cat">
        </div>
        
        <h1 id="titleText">Happy Anniversary นะคะคุณแฟน 💖</h1>
        <p id="questionText">เค้ามีอะไรจะถาม... รักเค้ามั้ย?</p>

        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">รักที่สุด</button>
            <button id="noBtn" onmouseover="handleNoAction()" onclick="handleNoAction()">ไม่รัก</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const titleText = document.getElementById('titleText');
        const questionText = document.getElementById('questionText');
        const statusGif = document.getElementById('statusGif');

        let currentScale = 1;

        function handleNoAction() {
            // สุ่มพิกัดใหม่ให้อยู่บนหน้าจอ
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            // เปลี่ยนเป็น fixed ทันทีเมื่อจะกด เพื่อให้มันวิ่งหนีออกไปนอกกรอบได้
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // ขยายปุ่มรัก
            currentScale += 0.25;
            yesBtn.style.setProperty('--btn-scale', currentScale);
        }

        function selectYes() {
            titleText.innerText = "เย้ๆๆๆๆ! ฮั่นแน่ รู้อยู่แล้วว่ารัก ❤️";
            questionText.innerText = "เค้าก็รักตัวเองเหมือนกันนะ อยู่ด้วยกันไปนานๆ นะครับ 🥰";
            
            // เปลี่ยนเป็นรูปแมวส่งหัวใจฟินๆ
            statusGif.src = "https://media.tenor.com/images/30713b10b00790b070407a56112ed2f0/tenor.gif";
            
            noBtn.style.display = 'none';
            yesBtn.style.animation = 'none';
            yesBtn.style.transform = 'scale(1.3)';
            yesBtn.innerText = "จุ๊บๆ 💋";
            yesBtn.onclick = null;
        }
    </script>
</body>
</html>
